server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy al backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8081/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Archivos de fotos de perfil
    location /profile_pictures/ {
        proxy_pass http://backend:8081/api/profile_pictures/;
        proxy_set_header Host $host;
    }

    # Nunca cachear index.html para que los navegadores siempre obtengan
    # los hashes de chunks correctos después de cada redespliegue
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Enrutamiento SPA – cualquier ruta desconocida cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Evitar logs de favicon
    location = /favicon.png {
        log_not_found off;
        access_log    off;
    }
}
